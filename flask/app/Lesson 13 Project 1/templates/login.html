{% extends "base.html" %}
{% block content %}

<h2>Login</h2>

<!-- Login form posts username and password to / route -->
<form method="POST">
<input name="username" placeholder="Username">
<input name="password" type="password" placeholder="Password">
<button>Login</button>
</form>

<!-- Link to registration page -->
<a href="/register">Register</a>

{% endblock %}
