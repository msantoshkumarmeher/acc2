<!DOCTYPE html>
<html>
<head>
    <title>Students</title>
</head>
<body>

<h2>Student List</h2>

<table border="1">
<tr>
<!-- Table headers for each student field -->
<th>ID</th>
<th>Name</th>
<th>Age</th>
<th>Course</th>
</tr>

{% for student in students %}
<tr>
<!-- student is a tuple: (id, name, age, course) -->
<td>{{ student[0] }}</td>
<td>{{ student[1] }}</td>
<td>{{ student[2] }}</td>
<td>{{ student[3] }}</td>
</tr>
{% endfor %}

</table>

</body>
</html>
