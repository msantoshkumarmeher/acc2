<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Management</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    <div class="container">
        <h2>Student List</h2>

        <!-- Link to add-student form -->
        <a href="/add" class="btn">Add Student</a>

        <table>
        <tr>
        <!-- Table headers -->
        <th>ID</th>
        <th>Name</th>
        <th>Age</th>
        <th>Actions</th>
        </tr>

        {% for s in students %}
        <tr>
        <!-- Access SQLite row values by column name -->
        <td>{{ s['id'] }}</td>
        <td>{{ s['name'] }}</td>
        <td>{{ s['age'] }}</td>
        <td>
        <!-- Edit and delete actions for each student -->
        <a href="/edit/{{ s['id'] }}" class="btn">Edit</a>
        <a href="/delete/{{ s['id'] }}" class="btn btn-danger">Delete</a>
        </td>
        </tr>
        {% endfor %}

        </table>
    </div>
</body>
</html>
